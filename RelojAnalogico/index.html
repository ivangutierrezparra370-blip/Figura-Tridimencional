<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reloj Analógico</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
    }

    #clock {
        background: white;
        border-radius: 50%;
        margin: 20px auto;
        display: block;
    }

    .controls {
        margin-top: 10px;
    }
</style>
</head>
<body>

<h2>Reloj Analógico</h2>

<canvas id="clock" width="400" height="400"></canvas>

<div class="controls">
    <label>Color Fondo:</label>
    <select id="bgColor">
        <option>Blanco</option>
        <option>Gris</option>
        <option>Negro</option>
    </select>

    <label>Hr:</label>
    <input type="number" id="hour" min="0" max="11">

    <label>Min:</label>
    <input type="number" id="minute" min="0" max="59">

    <label>Sec:</label>
    <input type="number" id="second" min="0" max="59">

    <button onclick="setTime()">Iniciar Tiempo</button>

    <label>
        <input type="checkbox" id="showSeconds" checked>
        Segundos
    </label>
</div>

<script>
const canvas = document.getElementById("clock");
const ctx = canvas.getContext("2d");

let hours, minutes, seconds;

function updateTime() {
    const now = new Date();
    hours = now.getHours() % 12;
    minutes = now.getMinutes();
    seconds = now.getSeconds();
}

function setTime() {
    hours = parseInt(document.getElementById("hour").value) || 0;
    minutes = parseInt(document.getElementById("minute").value) || 0;
    seconds = parseInt(document.getElementById("second").value) || 0;
}

function drawClock() {
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const radius = Math.min(centerX, centerY) - 20;

    // Fondo
    let bgColor = "white";
    const selected = document.getElementById("bgColor").value;
    if (selected === "Gris") bgColor = "lightgray";
    if (selected === "Negro") bgColor = "black";

    canvas.style.background = bgColor;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Círculo
    ctx.beginPath();
    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
    ctx.stroke();

    // Marcas de horas
    for (let i = 0; i < 12; i++) {
        const angle = (i * 30 - 90) * Math.PI / 180;
        const x = centerX + Math.cos(angle) * (radius - 10);
        const y = centerY + Math.sin(angle) * (radius - 10);

        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fill();
    }

    // Manecillas
    drawHand(centerX, centerY, radius - 60, 30 * hours + minutes / 2 - 90, "black");
    drawHand(centerX, centerY, radius - 40, 6 * minutes - 90, "black");

    if (document.getElementById("showSeconds").checked) {
        drawHand(centerX, centerY, radius - 30, 6 * seconds - 90, "red");
    }
}

function drawHand(x, y, length, angle, color) {
    const rad = angle * Math.PI / 180;
    const xEnd = x + Math.cos(rad) * length;
    const yEnd = y + Math.sin(rad) * length;

    ctx.strokeStyle = color;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(xEnd, yEnd);
    ctx.stroke();
}

function tick() {
    seconds++;
    if (seconds === 60) {
        seconds = 0;
        minutes++;
        if (minutes === 60) {
            minutes = 0;
            hours = (hours + 1) % 12;
        }
    }
    drawClock();
}

// Inicializar
updateTime();
setInterval(tick, 1000);
drawClock();
</script>

</body>
</html>
